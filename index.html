<body>

  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">🌊</div>

  <section id="tab-utilities" class="tab-panel"></section>
  <section id="tab-emergency" class="tab-panel"></section>
</main>

<div id="toast" role="status" aria-live="polite">Copied ✓</div>

<script>

const FX_GBP_PER_EUR = 0.855;

const TIMEZONE = 'Europe/Rome';

const TRIP = {
  tripTitle:  'Italy East Coast 2026',
  traveler:   'Gerhard Huber',
  curator:    'Happy Camper Ltd.',
  contact:    '+81 80 6989 2107',
  email:      'hello@happycamper.food',
  startDate:  '2026-08-17',

/* ─── Helpers ───────────────────────────────────────────────────────── */
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function todayInTZ() {
  const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: TIMEZONE, year: 'numeric', month: '2-digit', day: '2-digit' });
  return fmt.format(new Date());
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1900);
}

function copyText(text) {
  try { navigator.clipboard.writeText(text).then(() => toast('Copied ✓'), fb); } catch(e) { fb(); }
  function fb() {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Copied ✓'); } catch(e) { toast('Could not copy'); }
    document.body.removeChild(ta);
  }
}

function mapsLink(q) { return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q); }
function navLink(q)  { return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(q) + '&travelmode=driving'; }

/* ─── Clock ─────────────────────────────────────────────────────────── */
function updateClock() {
  const t = new Intl.DateTimeFormat('en-GB', { timeZone: TIMEZONE, hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date());
  const clock = $('#cest-clock');
  if (clock) clock.textContent = t;
  const today = todayInTZ();
  const lbl = $('#trip-day-label');
  if (!lbl) return;
  if (today < TRIP.startDate) {
    const days = Math.ceil((new Date(TRIP.startDate) - new Date(today)) / 86400000);
    lbl.textContent = days === 1 ? 'T-1 day · CEST' : `T-${days} days · CEST`;
  } else if (today > TRIP.endDate) {
    lbl.textContent = 'Trip complete · CEST';
  } else {
    const idx = Math.floor((new Date(today) - new Date(TRIP.startDate)) / 86400000) + 1;
    lbl.textContent = `Day ${idx} of ${TRIP.days.length} · CEST`;
  }
}

function wmoToEmoji(c) {
  if (c===0) return {icon:'☀️',desc:'Clear'};
  if (c<=2)  return {icon:'⛅',desc:'Partly cloudy'};
  if (c===3) return {icon:'☁️',desc:'Overcast'};
  if (c>=45&&c<=48) return {icon:'🌫️',desc:'Foggy'};
  if (c>=51&&c<=57) return {icon:'🌦️',desc:'Drizzle'};
  if (c>=61&&c<=67) return {icon:'🌧️',desc:'Rain'};
  if (c>=80&&c<=82) return {icon:'🌦️',desc:'Showers'};
  if (c>=95) return {icon:'⛈️',desc:'Storms'};
  return {icon:'🌤️',desc:'Mixed'};
}

async function fetchWeather() {
  const results = {};
  await Promise.allSettled(Object.entries(CITY_COORDS).map(async ([city, {lat,lon}]) => {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Europe%2FRome&forecast_days=16`;
      const data = await (await fetch(url)).json();
      data.daily.time.forEach((date,i) => {
        results[`${city}-${date}`] = { max: Math.round(data.daily.temperature_2m_max[i]), min: Math.round(data.daily.temperature_2m_min[i]), rain: data.daily.precipitation_probability_max[i]??0, code: data.daily.weathercode[i] };
      });
    } catch(e) {}
  }));
  return results;
}

function weatherCellHTML(day) {
  const w = weatherCache[`${day.weatherCity}-${day.date}`];
  if (!w) return `<span class="val" style="color:var(--ink-3)">Forecast within 16 days of travel</span>`;
  const {icon,desc} = wmoToEmoji(w.code);
  return `<span class="val"><span>${icon}</span> ${w.min}° / ${w.max}°C · ${desc} · ${w.rain}% rain</span>`;
}

  html += `<div class="hotels-wrap"><div class="section-label">Hotels at a glance</div><div class="hotels-grid">`;
  TRIP.hotels.forEach((h,i) => {
    html += `<div class="hotel-card"><div class="hotel-num">${i+1}</div><div class="hotel-info"><div class="hotel-name">${h.name}</div><div class="hotel-meta">${h.location} · ${h.nights}${h.ref && h.ref!=='—' && h.ref!=='Not yet booked' && h.ref!=='Confirmed' ? ' · Ref: '+h.ref : ''}</div></div><a class="hotel-link" href="${mapsLink(h.mapsQuery)}" target="_blank" rel="noopener">↗</a></div>`;
  });
  html += `</div></div>`;

  html += `<div class="section-label">Day by day</div><div id="days-container">`;
  TRIP.days.forEach((d,di) => {
    const isCurrent = d.date === today;
    const isPast = d.date < today;
    const cls = ['day-card'];
    if (isCurrent) cls.push('is-current','expanded');
    if (isPast) cls.push('is-past');
    if (di===0 && !isCurrent && !isPast) cls.push('expanded');
    html += `
      <article class="${cls.join(' ')}" data-date="${d.date}">
        <button class="day-header" aria-expanded="${cls.includes('expanded')}" onclick="toggleDay(this)">
          <div class="day-num">${d.dayNum}</div>
          <div class="day-meta">
            <div class="day-date">${d.weekday}</div>
            <div class="day-title">${d.city}</div>
          </div>
          ${isCurrent ? '<span class="day-city-badge">Today</span>' : ''}
          <span class="day-toggle">⌃</span>
        </button>
        <div class="day-body">
          <div class="day-strip">
            <div class="strip-item"><span class="label">Hotel</span>${d.hotel==='—'?'<span class="val" style="color:var(--ink-3)">Departure</span>':`<span class="val">${d.hotel}</span>`}</div>
            <div class="strip-item" data-weather data-key="${d.weatherCity}-${d.date}"><span class="label">Weather</span>${weatherCellHTML(d)}</div>
          </div>
          ${d.note?`<div class="day-note">${d.note}</div>`:''}
          <div class="stops">${d.stops.map(stopHTML).join('')}</div>
        </div>
      </article>`;
  });
  html += `</div>`;
  root.innerHTML = html;
}

function stopHTML(s) {
  const tags = [];
  if (s.tag) tags.push(`<span class="stop-type-tag">${s.tag}</span>`);
  if (s.badge) tags.push(`<span class="badge ${s.badgeClass||''}">${s.badge}</span>`);
  const acts = [];
  if (s.mapsQuery) { acts.push(`<a class="act-btn" href="${mapsLink(s.mapsQuery)}" target="_blank" rel="noopener">📍 Map</a>`); acts.push(`<a class="act-btn primary" href="${navLink(s.mapsQuery)}" target="_blank" rel="noopener">🧭 Navigate</a>`); }
  if (s.locationName) acts.push(`<button class="act-btn" onclick="copyText(${JSON.stringify(s.locationName).replace(/"/g,'&quot;')})">📋 Copy</button>`);
  if (s.phone) acts.push(`<a class="act-btn tel" href="tel:${s.phone.replace(/\s+/g,'')}">📞 Call</a>`);
  if (s.web)   acts.push(`<a class="act-btn" href="${s.web}" target="_blank" rel="noopener">🌐 Site</a>`);
  let drive = '';
  if (s.drive) drive = `<div class="drive-card"><span class="miles">${s.drive.km} km</span><span>${s.drive.hrs}${s.drive.via?' · '+s.drive.via:''}</span></div>`;
  return `<div class="stop" data-type="${s.type||'leisure'}">
    <div class="stop-header"><span class="stop-time">${s.time||''}</span>${tags.join('')}</div>
    <div class="stop-title">${s.title}</div>
    ${s.subtitle?`<div class="stop-subtitle">${s.subtitle}</div>`:''}
    ${drive}
    ${s.locationName?`<div class="stop-loc">${s.locationName}</div>`:''}
    ${s.notes?`<div class="stop-notes">${s.notes}</div>`:''}
    ${acts.length?`<div class="stop-actions">${acts.join('')}</div>`:''}
  </div>`;
}

function toggleDay(btn) {
  const card = btn.closest('.day-card');
  const open = card.classList.toggle('expanded');
  btn.setAttribute('aria-expanded', open);
}

/* ─── FX converter ──────────────────────────────────────────────────── */
function setupFX() {
  const eur = $('#fx-eur'), gbp = $('#fx-gbp'), jpy = $('#fx-jpy');
  if (!eur) return;
  eur.value = 100;
  convertFX('eur');
}
function convertFX(src) {
  const eur = $('#fx-eur'), gbp = $('#fx-gbp'), jpy = $('#fx-jpy');
  if (!eur || !gbp || !jpy) return;
  let e = parseFloat(eur.value), g = parseFloat(gbp.value), j = parseFloat(jpy.value);
  if (src==='eur' && !isNaN(e)) { gbp.value=(e*FX_GBP_PER_EUR).toFixed(2); jpy.value=Math.round(e*FX_JPY_PER_EUR); }
  else if (src==='gbp' && !isNaN(g)) { e=g/FX_GBP_PER_EUR; eur.value=e.toFixed(2); jpy.value=Math.round(e*FX_JPY_PER_EUR); }
  else if (src==='jpy' && !isNaN(j)) { e=j/FX_JPY_PER_EUR; eur.value=e.toFixed(2); gbp.value=(e*FX_GBP_PER_EUR).toFixed(2); }
}

/* ─── Tabs ──────────────────────────────────────────────────────────── */
function switchTab(name) {
  activeTab = name;
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===name));
  $$('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='tab-'+name));
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ─── Init ──────────────────────────────────────────────────────────── */
function refreshWeather() {
  $$('[data-weather]').forEach(el => {
    const w = weatherCache[el.dataset.key];
    if (!w) return;
    const {icon,desc} = wmoToEmoji(w.code);
    const v = el.querySelector('.val');
    if (v) v.remove();
    const s = document.createElement('span');
    s.className='val';
    s.innerHTML=`<span>${icon}</span> ${w.min}° / ${w.max}°C · ${desc} · ${w.rain}% rain`;
    el.appendChild(s);
  });
}

(async function init() {
  renderItinerary();
  renderUtilities();
  renderEmergency();
  updateClock();
  setInterval(updateClock, 30000);
  weatherCache = await fetchWeather();
  refreshWeather();
})();
</script>
